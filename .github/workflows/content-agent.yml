name: Weekly Content Agent

on:
  schedule:
    # Every Monday at 13:00 UTC (9am ET)
    - cron: '0 13 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/content-agent.mjs

      - name: Regenerate sitemap, llms.txt, and markdown pages
        working-directory: client
        run: |
          npm ci
          npm run generate:llms

      - name: Read article title
        id: article
        run: |
          TITLE=$(node -e "console.log(JSON.parse(require('fs').readFileSync('client/src/data/articles.json','utf8'))[0].title)")
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'content: add weekly article — ${{ steps.article.outputs.title }}'
          branch: content-agent/weekly-article
          branch-suffix: timestamp
          delete-branch: true
          title: 'Weekly article: ${{ steps.article.outputs.title }}'
          body: |
            Automated weekly article generated by the content agent.

            ## What's included
            - New article markdown in `client/public/articles/`
            - Updated `client/src/data/articles.json` index
            - Regenerated `sitemap.xml`, `llms.txt`, and markdown mirrors
            - Topic marked done in `marketing/topics.json`

            ## Review checklist
            - [ ] Read the article for accuracy and tone
            - [ ] Verify internal template links resolve
            - [ ] Merge to publish (deploys with the next release)
          labels: content

      - name: Send approval email
        if: steps.cpr.outputs.pull-request-number
        env:
          CONTENT_APPROVAL_SECRET: ${{ secrets.CONTENT_APPROVAL_SECRET }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          ARTICLE_TITLE: ${{ steps.article.outputs.title }}
        run: |
          payload=$(node -e "console.log(JSON.stringify({ prNumber: Number(process.env.PR_NUMBER), title: process.env.ARTICLE_TITLE, prUrl: process.env.PR_URL }))")
          curl --fail-with-body -sS -X POST https://www.givelive.app/api/content/notify \
            -H "Content-Type: application/json" \
            -H "x-agent-secret: $CONTENT_APPROVAL_SECRET" \
            -d "$payload"
